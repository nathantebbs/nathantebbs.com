{{ define "main" -}}
{{ .Content }}
<div id="home-splash-wrapper">
	<div id="home-splash">
		<h1>{{ .Title }}</h1>
		<div id="home-splash-content">
			<div class="img-full-round">
			    {{ $image := resources.Get "headshot.jpg" }}
			    {{ $thumb := $image.Resize "200x Linear"}}
			    <img src="{{ $thumb.RelPermalink }}" width="{{ $thumb.Width }}" height="{{ $thumb.Height }}" class="img-round">
			</div>
			<div id="resource-list">
				<ul>
					{{ range site.Sections }}
					<li>
						<a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
					</li>
					{{ end }}
				</ul>
			</div>
			<div id="socials">
			    
			</div>
		</div>
	</div>
</div>
{{- end}}
